name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # Required for creating GitHub Releases
  id-token: write   # Required for trusted publishing (OIDC)

jobs:
  release_gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[fastembed,dev]"

      - name: Run full novelty evaluation
        run: python -m benchmarks.novelty_eval --mode full --output benchmarks/results/novelty_eval_release_full.json

      - name: Enforce mandatory release gates
        run: >
          python scripts/verify_release_gates.py
          --novelty-result benchmarks/results/novelty_eval_release_full.json
          --scope-use-case "Drift-aware debugging memory"
          --output benchmarks/results/release_gate_report.json

      - name: Upload release gate evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-evidence
          path: |
            benchmarks/results/novelty_eval_release_full.json
            benchmarks/results/release_gate_report.json

  build:
    needs: release_gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify tag version matches pyproject.toml
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          expected = tag.removeprefix("v")
          pyproject_text = Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"(.+?)"', pyproject_text, re.MULTILINE)
          if not match:
              print("Could not find version in pyproject.toml")
              sys.exit(1)
          actual = match.group(1)
          if actual != expected:
              print(f"Tag/version mismatch: tag={expected}, pyproject={actual}")
              sys.exit(1)
          print(f"Verified version sync: {actual}")
          PY

      - name: Check if version exists on PyPI
        id: check-version
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          package = "consolidation-memory"
          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          output_path = os.environ["GITHUB_OUTPUT"]
          url = f"https://pypi.org/pypi/{package}/json"
          print(f"Checking if {package}=={version} exists on PyPI...")

          exists = False
          try:
              with urllib.request.urlopen(url, timeout=15) as response:
                  payload = json.load(response)
              releases = payload.get("releases", {})
              exists = version in releases
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise

          with open(output_path, "a", encoding="utf-8") as output_file:
              output_file.write(f"publish={'false' if exists else 'true'}\n")

          if exists:
              print(f"Version {version} already exists on PyPI; publish step will be skipped.")
          else:
              print(f"Version {version} does not exist on PyPI; publish will proceed.")
          PY

      - name: Download build artifacts
        if: steps.check-version.outputs.publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        if: steps.check-version.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## ${VERSION} /{found=1; next} /^## [0-9]/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          generate_release_notes: false
