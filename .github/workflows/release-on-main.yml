name: Automated Release On Main

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Optional forced bump override"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: automated-release-main
  cancel-in-progress: false

jobs:
  decide:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.criteria.outputs.should_release }}
      bump: ${{ steps.criteria.outputs.bump }}
      reason: ${{ steps.criteria.outputs.reason }}
      commits_scanned: ${{ steps.criteria.outputs.commits_scanned }}
      from_ref: ${{ steps.criteria.outputs.from_ref }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - id: criteria
        name: Evaluate release criteria
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.bump }}" != "auto" ]; then
            {
              echo "should_release=true"
              echo "bump=${{ inputs.bump }}"
              echo "reason=Manual dispatch bump override."
              echo "commits_scanned=0"
              echo "from_ref="
            } >> "$GITHUB_OUTPUT"
          else
            python scripts/release_criteria.py --github-output "$GITHUB_OUTPUT"
          fi

      - name: Criteria summary
        run: |
          echo "should_release=${{ steps.criteria.outputs.should_release }}"
          echo "bump=${{ steps.criteria.outputs.bump }}"
          echo "reason=${{ steps.criteria.outputs.reason }}"
          echo "from_ref=${{ steps.criteria.outputs.from_ref }}"
          echo "commits_scanned=${{ steps.criteria.outputs.commits_scanned }}"

  release:
    needs: decide
    if: needs.decide.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Verify release PAT is configured
        env:
          RELEASE_AUTOMATION_PAT: ${{ secrets.RELEASE_AUTOMATION_PAT }}
        run: |
          if [ -z "$RELEASE_AUTOMATION_PAT" ]; then
            echo "::error::Missing required secret RELEASE_AUTOMATION_PAT."
            echo "::error::Create a classic PAT with repo scope, then add it as repo secret RELEASE_AUTOMATION_PAT."
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.RELEASE_AUTOMATION_PAT }}
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Configure git bot identity
        run: |
          git config user.name "consolidation-memory-release-bot"
          git config user.email "consolidation-memory-release-bot@users.noreply.github.com"

      - name: Run release automation
        run: python scripts/release.py --bump "${{ needs.decide.outputs.bump }}"
