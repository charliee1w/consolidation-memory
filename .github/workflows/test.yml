name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  novelty_gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.CI_CHECKOUT_TOKEN != '' && secrets.CI_CHECKOUT_TOKEN || github.token }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[fastembed,dev]"

      - name: Run claim graph + drift + adaptive scheduler tests
        run: >
          python -m pytest
          tests/test_claim_graph.py
          tests/test_drift_invalidation.py
          tests/test_adaptive_consolidation.py
          tests/test_utility_scheduler.py
          -q

      - name: Run novelty eval quick
        run: python -m benchmarks.novelty_eval --mode quick --output benchmarks/results/novelty_eval_ci_quick.json

      - name: Enforce novelty metric gate
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path("benchmarks/results/novelty_eval_ci_quick.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          overall_pass = bool(data.get("overall_pass"))
          print(f"novelty_eval overall_pass={overall_pass}")
          if not overall_pass:
              for key, section in data.get("sections", {}).items():
                  print(f"{key}: pass={section.get('pass')}, measured={section.get('measured')}")
              sys.exit(1)
          PY

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.CI_CHECKOUT_TOKEN != '' && secrets.CI_CHECKOUT_TOKEN || github.token }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install packaging dependencies
        run: pip install -e ".[dev]"

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate built artifacts
        run: python -m twine check --strict dist/*

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.CI_CHECKOUT_TOKEN != '' && secrets.CI_CHECKOUT_TOKEN || github.token }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -e ".[fastembed,dev]"

      - name: Install REST dependencies
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        run: pip install -e ".[rest]"

      - name: Run tests
        run: python -m pytest tests/ -v --cov=consolidation_memory --cov-report=xml

      - name: Builder baseline smoke
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        run: python scripts/smoke_builder_base.py

      - name: ResourceWarning gate
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        run: python -m pytest tests/ -q -W error::ResourceWarning

      - name: Lint
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        run: ruff check src/ tests/

      - name: Type check
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        run: mypy src/consolidation_memory/

      - name: Security check
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        run: bandit -q -r src scripts

  optional_surfaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.CI_CHECKOUT_TOKEN != '' && secrets.CI_CHECKOUT_TOKEN || github.token }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install optional surface dependencies
        run: pip install -e ".[all,dev]"

      - name: Run optional surface tests
        run: >
          python -m pytest
          tests/test_optional_surfaces.py
          tests/test_rest.py
          tests/test_rest_security.py
          tests/test_claim_retrieval.py
          tests/test_scope_policy_contracts.py
          tests/test_surface_contracts.py
          tests/test_temporal_belief_queries.py
          tests/test_dashboard.py
          tests/test_dashboard_data.py
          -q
