name: Novelty Full Nightly

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  novelty_full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[fastembed,dev]"

      - name: Run novelty eval full
        run: python -m benchmarks.novelty_eval --mode full --output benchmarks/results/novelty_eval_full_nightly.json

      - name: Verify release gates against nightly evidence
        run: >
          python scripts/verify_release_gates.py
          --novelty-result benchmarks/results/novelty_eval_full_nightly.json
          --scope-use-case "Drift-aware debugging memory"
          --output benchmarks/results/release_gate_report_nightly.json

      - name: Upload nightly novelty artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: novelty-full-nightly
          path: |
            benchmarks/results/novelty_eval_full_nightly.json
            benchmarks/results/release_gate_report_nightly.json
