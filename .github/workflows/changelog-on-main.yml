name: Update Changelog On Main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: changelog-update-main
  cancel-in-progress: false

jobs:
  decide:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      has_release_pat: ${{ steps.release_auth.outputs.has_release_pat }}
    steps:
      - id: release_auth
        name: Detect release automation PAT
        env:
          RELEASE_AUTOMATION_PAT: ${{ secrets.RELEASE_AUTOMATION_PAT }}
        run: |
          if [ -n "$RELEASE_AUTOMATION_PAT" ]; then
            echo "has_release_pat=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_release_pat=false" >> "$GITHUB_OUTPUT"
          fi

  changelog_skipped_missing_pat:
    needs: decide
    if: needs.decide.outputs.has_release_pat != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip changelog update when PAT is not configured
        run: |
          echo "::warning::Skipping automated changelog update. Add RELEASE_AUTOMATION_PAT repo secret to enable it."

  changelog:
    needs: decide
    if: needs.decide.outputs.has_release_pat == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.RELEASE_AUTOMATION_PAT }}
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Configure git bot identity
        run: |
          git config user.name "consolidation-memory-release-bot"
          git config user.email "consolidation-memory-release-bot@users.noreply.github.com"

      - name: Refresh Unreleased changelog section
        id: update
        run: |
          set -euo pipefail
          python scripts/update_changelog.py
          if git diff --quiet -- CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changelog changes required."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changelog update
        if: steps.update.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git add CHANGELOG.md
          git commit -m "chore(changelog): update Unreleased section [skip release]"
          git push origin main